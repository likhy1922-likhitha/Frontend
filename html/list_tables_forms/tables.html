<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables-HTML</title>
</head>

<style>
    table{
        border: 2px solid black;
    }
    tr,td,th{
        border: 2px solid black;
    }
</style>
<body>
    <header></header>

    <main>
        <h1>Tables in HTML</h1>
        <table>
            <thead>
                <tr>
                    <!-- heading row -->
                    <th>rollno</th>
                    <th>Student_name</th>
                    <th>Marks</th>
                    <th>Section</th>
                </tr>

            </thead>
            <!-- content row -->
            <tr>
                <td>1</td>
                <td>Likhitha</td>
                <td>80</td>
                <td rowspan="4">Alpha used rowspan="3"</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Geetha</td>
                <td>50</td>
                
            </tr>
            <tr>
                <td>3</td>
                <td>Lowkick</td>
                <td>100</td>
            </tr>
            <tr>
                <td colspan="3">total no.of students:  3 used colspan="3"</td>
                
            </tr>

        </table>
    </main>

    <footer></footer>
</body>

</html>
